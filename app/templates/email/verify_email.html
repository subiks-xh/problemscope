<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 20px;
      }
      .container {
        background: white;
        max-width: 600px;
        margin: 0 auto;
        padding: 30px;
        border-radius: 10px;
      }
      .btn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 12px 30px;
        text-decoration: none;
        border-radius: 5px;
        display: inline-block;
        margin-top: 20px;
      }
      h1 {
        color: #667eea;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Welcome to ProblemScope! 🎉</h1>
      <p>Hi {{ user.username }},</p>
      <p>
        Thank you for registering! Please verify your email address by clicking
        the button below:
      </p>
      <a href="http://127.0.0.1:5000/verify_email/{{ token }}" class="btn"
        >Verify Email</a
      >
      <p style="margin-top: 20px; color: #666">
        If the button doesn't work, copy and paste this link:
      </p>
      <p style="color: #667eea">
        http://127.0.0.1:5000/verify_email/{{ token }}
      </p>
      <p style="margin-top: 30px; color: #999; font-size: 12px">
        This link expires in 1 hour.
      </p>
    </div>
  </body>
</html>
